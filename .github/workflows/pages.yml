name: Pages

# Pages is now deployed automatically at the end of build-release.yml.
# This workflow is kept as a manual "rebuild site" entry point only.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _site
          cp site/index.html _site/index.html
          python3 - <<'PY'
          import json, os, re, urllib.request
          repo = os.environ["GITHUB_REPOSITORY"]
          headers = {"Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                     "Accept": "application/vnd.github+json", "User-Agent": "pages-gen"}
          items, url = [], f"https://api.github.com/repos/{repo}/releases?per_page=100"
          while url:
              with urllib.request.urlopen(urllib.request.Request(url, headers=headers)) as r:
                  items.extend(json.load(r))
                  m = re.search(r'<([^>]+)>;\s*rel="next"', r.headers.get("Link", ""))
                  url = m.group(1) if m else None
          out = []
          for rel in items:
              board = rel["tag_name"].split("-")[-1]            # board from tag suffix; no enum
              for a in rel["assets"]:
                  if a["name"].endswith((".img", ".img.xz")):
                      out.append({"board": board, "tag": rel["tag_name"], "date": rel["published_at"],
                                  "asset": a["name"], "size": a["size"],
                                  "url": a["browser_download_url"], "release_url": rel["html_url"]})
          out.sort(key=lambda x: x["date"], reverse=True)
          json.dump(out, open("_site/data.json", "w"), indent=2, ensure_ascii=False)
          print(f"wrote {len(out)} entries")
          PY

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
