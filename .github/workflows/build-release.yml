name: Build
run-name: Build with Focalcrest ${{ github.event.inputs.board }} Production Test

on:
  workflow_dispatch:
    inputs:
      board:
        description: Select board to build
        required: true
        default: AZ04B
        type: choice
        options:
          - AZ04B
          - AZ07

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      SOURCE_DIR: ${{ github.workspace }}/source
      RAW_IMAGE_DIR: output/raw/Image
      CCACHE_DIR: /tmp/buildroot-ccache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git ssh make gcc libssl-dev liblz4-tool expect g++ patchelf chrpath \
            gawk texinfo diffstat software-properties-common bison flex fakeroot \
            cmake gcc-multilib g++-multilib unzip device-tree-compiler libncurses-dev \
            python3-pip python3-pyelftools bc build-essential zlib1g-dev libbz2-dev \
            libreadline-dev libsqlite3-dev wget curl llvm libncursesw5-dev xz-utils \
            tk-dev libxml2-dev libxmlsec1-dev libffi-dev liblzma-dev uuid-dev lzma-dev \
            libbluetooth-dev u-boot-tools sudo time rsync libmpc-dev bsdmainutils \
            gettext xxd binfmt-support qemu-user-static git-lfs python-is-python3 \
            ca-certificates file \
            ccache

          ccache --version
          git lfs install

      - name: Install repo
        shell: bash
        run: |
          set -euo pipefail

          sudo curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo
          repo version

      - name: Download source code
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${SOURCE_DIR}"
          cd "${SOURCE_DIR}"

          if [ "${{ github.event.inputs.board }}" = "AZ04B" ]; then
            repo init \
              -u https://github.com/mixtile-rockchip/manifests.git \
              -b linux-6.1-stan-rkr7 \
              -m rk3588-linux6.1-stan-rkr7.xml
          elif [ "${{ github.event.inputs.board }}" = "AZ07" ]; then
            repo init \
              -u https://github.com/mixtile-rockchip/manifests.git \
              -b linux-6.1-stan-rkr7 \
              -m rk3566_rk3568-linux6.1-stan-rkr7.xml
          else
            echo "Unsupported board: ${{ github.event.inputs.board }}" >&2
            exit 1
          fi

          repo sync -j"$(nproc)" --force-sync
          repo forall -c 'git lfs fetch --all && git lfs checkout'

      - name: Setup GitLab HTTPS credentials
        shell: bash
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GITLAB_TOKEN}" ]]; then
            echo "Missing required repository secret: GITLAB_TOKEN" >&2
            exit 1
          fi

          cat > ~/.netrc <<EOF
          machine code.focalcrest.com
          login oauth2
          password ${GITLAB_TOKEN}
          EOF
          chmod 600 ~/.netrc
          sudo cp ~/.netrc /root/.netrc
          sudo chmod 600 /root/.netrc

      - name: Copy Focalcrest logo
        shell: bash
        run: |
          set -euo pipefail

          cp assets/logo/focalcrest.bmp "${SOURCE_DIR}/kernel/logo.bmp"
          cp assets/logo/focalcrest.bmp "${SOURCE_DIR}/kernel/logo_kernel.bmp"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /tmp/buildroot-ccache
          key: br-ccache-${{ github.event.inputs.board }}-${{ github.sha }}
          restore-keys: |
            br-ccache-${{ github.event.inputs.board }}-

      - name: Inject Buildroot ccache config
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event.inputs.board }}" = "AZ04B" ]; then
            CFG="${SOURCE_DIR}/buildroot/configs/rockchip_rk3588s_focalcrest_az04b_defconfig"
          elif [ "${{ github.event.inputs.board }}" = "AZ07" ]; then
            CFG="${SOURCE_DIR}/buildroot/configs/rockchip_rk3566_focalcrest_az07_defconfig"
          fi

          # Remove any existing ccache settings to avoid duplicates
          sed -i '/^BR2_CCACHE/d' "$CFG"

          # Append ccache settings
          echo 'BR2_CCACHE=y' >> "$CFG"
          echo 'BR2_CCACHE_DIR="/tmp/buildroot-ccache"' >> "$CFG"
          echo 'BR2_CCACHE_INITIAL_SETUP="--max-size=5G"' >> "$CFG"
          echo 'BR2_CCACHE_USE_BASEDIR=y' >> "$CFG"

          echo "--- Injected ccache config into $(basename "$CFG") ---"
          tail -5 "$CFG"

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail

          cd "${SOURCE_DIR}"

          # Ensure ccache dir exists and is writable by root (sudo builds as root)
          mkdir -p "${CCACHE_DIR}"
          sudo chmod 777 "${CCACHE_DIR}"

          if [ "${{ github.event.inputs.board }}" = "AZ04B" ]; then
            sudo -E ./build.sh chip:rk3588:rockchip_rk3588s_focalcrest_az04b_defconfig
          elif [ "${{ github.event.inputs.board }}" = "AZ07" ]; then
            sudo -E ./build.sh chip:rk3566_rk3568:rockchip_rk3566_focalcrest_az07_defconfig
          fi
          sudo -E ./build.sh all

      - name: ccache statistics
        if: always()
        shell: bash
        run: |
          echo "=== ccache statistics ==="
          ccache -s 2>/dev/null || sudo ccache -s 2>/dev/null || echo "ccache stats unavailable"

      - name: Rename and compress raw image
        id: package
        shell: bash
        run: |
          set -euo pipefail

          DATE=$(date +%Y-%m-%d)
          BOARD="${{ github.event.inputs.board }}"

          cd "${SOURCE_DIR}/${RAW_IMAGE_DIR}"
          sudo mv raw.img "image-raw-format-${BOARD}-Production-Test-${DATE}.img"
          sudo xz -4 --force --quiet --threads=0 "image-raw-format-${BOARD}-Production-Test-${DATE}.img"
          sudo chown "${USER}:${USER}" "image-raw-format-${BOARD}-Production-Test-${DATE}.img.xz"

          echo "archive_path=${SOURCE_DIR}/${RAW_IMAGE_DIR}/image-raw-format-${BOARD}-Production-Test-${DATE}.img.xz" >> "${GITHUB_OUTPUT}"

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DATE_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TAG_TIMESTAMP_UTC="$(date -u +%Y%m%d%H%M%S)"
          BOARD="${{ github.event.inputs.board }}"
          TAG_NAME="Production-Test-${TAG_TIMESTAMP_UTC}-${BOARD}"

          echo "build_date_utc=${BUILD_DATE_UTC}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ github.event.inputs.board }} Production Test Build ${{ github.run_id }}
          body: |
            ${{ github.event.inputs.board }} Production Test Image
            Build Date: ${{ steps.release_meta.outputs.build_date_utc }}
            Run ID: ${{ github.run_id }}
          files: ${{ steps.package.outputs.archive_path }}
          draft: false
          prerelease: false
          make_latest: legacy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean cache
        if: always()
        shell: bash
        run: |
          sync
          sudo rm -rf "${SOURCE_DIR}/output"
          sync
