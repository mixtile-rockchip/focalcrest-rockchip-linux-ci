name: Build
run-name: Build Focalcrest ${{ github.event.inputs.board }} ${{ github.event.inputs.build_type }}

on:
  workflow_dispatch:
    inputs:
      board:
        description: Select board to build
        required: true
        default: AZ04B
        type: choice
        options:
          - AZ04A
          - AZ04B
          - AZ05
          - AZ07
          - AZ08
      build_type:
        description: Build type (Test = 测试固件, Release = 正式发布固件)
        required: true
        default: Test
        type: choice
        options:
          - Test
          - Release

permissions:
  contents: write      # publish release
  pages: write         # deploy GitHub Pages
  id-token: write      # required by actions/deploy-pages (OIDC)

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      SOURCE_DIR: ${{ github.workspace }}/source
      RAW_IMAGE_DIR: output/raw/Image
      CCACHE_DIR: /tmp/buildroot-ccache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git ssh make gcc libssl-dev liblz4-tool expect g++ patchelf chrpath \
            gawk texinfo diffstat software-properties-common bison flex fakeroot \
            cmake gcc-multilib g++-multilib unzip device-tree-compiler libncurses-dev \
            python3-pip python3-pyelftools bc build-essential zlib1g-dev libbz2-dev \
            libreadline-dev libsqlite3-dev wget curl llvm libncursesw5-dev xz-utils \
            tk-dev libxml2-dev libxmlsec1-dev libffi-dev liblzma-dev uuid-dev lzma-dev \
            libbluetooth-dev u-boot-tools sudo time rsync libmpc-dev bsdmainutils \
            gettext xxd binfmt-support qemu-user-static git-lfs python-is-python3 \
            ca-certificates file \
            ccache

          ccache --version
          git lfs install

      - name: Install repo
        shell: bash
        run: |
          set -euo pipefail

          sudo curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo
          repo version

      - name: Download source code
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${SOURCE_DIR}"
          cd "${SOURCE_DIR}"

          if [ "${{ github.event.inputs.board }}" = "AZ04B" ]; then
            repo init \
              -u https://github.com/mixtile-rockchip/manifests.git \
              -b linux-6.1-stan-rkr7 \
              -m rk3588-linux6.1-stan-rkr7.xml
          elif [ "${{ github.event.inputs.board }}" = "AZ04A" ]; then
            repo init \
              -u https://github.com/mixtile-rockchip/manifests.git \
              -b linux-6.1-stan-rkr7 \
              -m rk3588-linux6.1-stan-rkr7.xml
          elif [ "${{ github.event.inputs.board }}" = "AZ05" ]; then
            repo init \
              -u https://github.com/mixtile-rockchip/manifests.git \
              -b linux-6.1-stan-rkr7 \
              -m rk3288-linux6.1-stan-rkr7.xml
          elif [ "${{ github.event.inputs.board }}" = "AZ07" ]; then
            repo init \
              -u https://github.com/mixtile-rockchip/manifests.git \
              -b linux-6.1-stan-rkr7 \
              -m rk3566_rk3568-linux6.1-stan-rkr7.xml
          elif [ "${{ github.event.inputs.board }}" = "AZ08" ]; then
            repo init \
              -u https://github.com/mixtile-rockchip/manifests.git \
              -b linux-6.1-stan-rkr7 \
              -m rk3576-linux6.1-stan-rkr7.xml
          else
            echo "Unsupported board: ${{ github.event.inputs.board }}" >&2
            exit 1
          fi

          repo sync -j"$(nproc)" --force-sync
          repo forall -c 'git lfs fetch --all && git lfs checkout'

      - name: Setup GitLab HTTPS credentials
        shell: bash
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GITLAB_TOKEN}" ]]; then
            echo "Missing required repository secret: GITLAB_TOKEN" >&2
            exit 1
          fi

          cat > ~/.netrc <<EOF
          machine code.focalcrest.com
          login oauth2
          password ${GITLAB_TOKEN}
          EOF
          chmod 600 ~/.netrc
          sudo cp ~/.netrc /root/.netrc
          sudo chmod 600 /root/.netrc

      - name: Copy Focalcrest logo
        shell: bash
        run: |
          set -euo pipefail

          cp assets/logo/focalcrest.bmp "${SOURCE_DIR}/kernel/logo.bmp"
          cp assets/logo/focalcrest.bmp "${SOURCE_DIR}/kernel/logo_kernel.bmp"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /tmp/buildroot-ccache
          key: br-ccache-${{ github.event.inputs.board }}-${{ github.sha }}
          restore-keys: |
            br-ccache-${{ github.event.inputs.board }}-

      - name: Inject Buildroot ccache config
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event.inputs.board }}" = "AZ04B" ]; then
            CFG="${SOURCE_DIR}/buildroot/configs/rockchip_rk3588s_focalcrest_az04b_defconfig"
          elif [ "${{ github.event.inputs.board }}" = "AZ04A" ]; then
            CFG="${SOURCE_DIR}/buildroot/configs/rockchip_rk3588_focalcrest_az04a_defconfig"
          elif [ "${{ github.event.inputs.board }}" = "AZ05" ]; then
            CFG="${SOURCE_DIR}/buildroot/configs/rockchip_rk3288_focalcrest_az05_defconfig"
          elif [ "${{ github.event.inputs.board }}" = "AZ07" ]; then
            CFG="${SOURCE_DIR}/buildroot/configs/rockchip_rk3566_focalcrest_az07_defconfig"
          elif [ "${{ github.event.inputs.board }}" = "AZ08" ]; then
            CFG="${SOURCE_DIR}/buildroot/configs/rockchip_rk3576s_focalcrest_az08_defconfig"
          fi

          # Remove any existing ccache settings to avoid duplicates
          sed -i '/^BR2_CCACHE/d' "$CFG"

          # Append ccache settings
          echo 'BR2_CCACHE=y' >> "$CFG"
          echo 'BR2_CCACHE_DIR="/tmp/buildroot-ccache"' >> "$CFG"
          echo 'BR2_CCACHE_INITIAL_SETUP="--max-size=5G"' >> "$CFG"
          echo 'BR2_CCACHE_USE_BASEDIR=y' >> "$CFG"

          echo "--- Injected ccache config into $(basename "$CFG") ---"
          tail -5 "$CFG"

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail

          cd "${SOURCE_DIR}"

          # Ensure ccache dir exists and is writable by root (sudo builds as root)
          mkdir -p "${CCACHE_DIR}"
          sudo chmod 777 "${CCACHE_DIR}"

          if [ "${{ github.event.inputs.board }}" = "AZ04B" ]; then
            sudo -E ./build.sh chip:rk3588:rockchip_rk3588s_focalcrest_az04b_defconfig
          elif [ "${{ github.event.inputs.board }}" = "AZ04A" ]; then
            sudo -E ./build.sh chip:rk3588:rockchip_rk3588_focalcrest_az04a_defconfig
          elif [ "${{ github.event.inputs.board }}" = "AZ05" ]; then
            sudo -E ./build.sh chip:rk3288:rockchip_rk3288_focalcrest_az05_defconfig
          elif [ "${{ github.event.inputs.board }}" = "AZ07" ]; then
            sudo -E ./build.sh chip:rk3566_rk3568:rockchip_rk3566_focalcrest_az07_defconfig
          elif [ "${{ github.event.inputs.board }}" = "AZ08" ]; then
            sudo -E ./build.sh chip:rk3576:rockchip_rk3576s_focalcrest_az08_defconfig
          fi
          sudo -E ./build.sh all

      - name: ccache statistics
        if: always()
        shell: bash
        run: |
          echo "=== ccache statistics ==="
          ccache -s 2>/dev/null || sudo ccache -s 2>/dev/null || echo "ccache stats unavailable"

      # Map the build_type input to the channel's naming / release flags.
      # Test    -> label Production-Test, tag prefix test-,    prerelease=true  (never "Latest")
      # Release -> label Official-Release, tag prefix release-, prerelease=false + make_latest
      - name: Resolve build type
        id: bt
        shell: bash
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type }}
        run: |
          set -euo pipefail
          if [ "${BUILD_TYPE}" = "Release" ]; then
            echo "label=Official-Release"      >> "${GITHUB_OUTPUT}"
            echo "tag_prefix=release"          >> "${GITHUB_OUTPUT}"
            echo "prerelease=false"            >> "${GITHUB_OUTPUT}"
            echo "make_latest=true"            >> "${GITHUB_OUTPUT}"
            echo "name_suffix=Official Release" >> "${GITHUB_OUTPUT}"
          else
            echo "label=Production-Test"       >> "${GITHUB_OUTPUT}"
            echo "tag_prefix=test"             >> "${GITHUB_OUTPUT}"
            echo "prerelease=true"             >> "${GITHUB_OUTPUT}"
            echo "make_latest=false"           >> "${GITHUB_OUTPUT}"
            echo "name_suffix=Production Test" >> "${GITHUB_OUTPUT}"
          fi

      - name: Rename raw image
        id: package
        shell: bash
        env:
          BOARD: ${{ github.event.inputs.board }}
          LABEL: ${{ steps.bt.outputs.label }}
        run: |
          set -euo pipefail

          DATE=$(date +%Y-%m-%d)
          IMG="image-raw-format-${BOARD}-${LABEL}-${DATE}.img"

          cd "${SOURCE_DIR}/${RAW_IMAGE_DIR}"
          sudo mv raw.img "${IMG}"
          sudo chown "${USER}:${USER}" "${IMG}"

          echo "archive_path=${SOURCE_DIR}/${RAW_IMAGE_DIR}/${IMG}" >> "${GITHUB_OUTPUT}"

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        env:
          BOARD: ${{ github.event.inputs.board }}
          TAG_PREFIX: ${{ steps.bt.outputs.tag_prefix }}
        run: |
          set -euo pipefail

          BUILD_DATE_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TAG_TIMESTAMP_UTC="$(date -u +%Y%m%d%H%M%S)"
          TAG_NAME="${TAG_PREFIX}-${TAG_TIMESTAMP_UTC}-${BOARD}"

          echo "build_date_utc=${BUILD_DATE_UTC}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ github.event.inputs.board }} ${{ steps.bt.outputs.name_suffix }} Build ${{ github.run_id }}
          body: |
            ${{ github.event.inputs.board }} ${{ steps.bt.outputs.name_suffix }} Image
            Build Date: ${{ steps.release_meta.outputs.build_date_utc }}
            Run ID: ${{ github.run_id }}
          files: ${{ steps.package.outputs.archive_path }}
          draft: false
          prerelease: ${{ steps.bt.outputs.prerelease }}
          make_latest: ${{ steps.bt.outputs.make_latest }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean cache
        if: always()
        shell: bash
        run: |
          sync
          sudo rm -rf "${SOURCE_DIR}/output"
          sync

  deploy-pages:
    needs: build                 # only after build succeeds and release is published
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 site/build.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
