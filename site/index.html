<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focalcrest Rockchip Linux Images</title>
<style>
  :root{--fg:#1f2328;--muted:#57606a;--link:#0969da;--visited:#6f42c1;
        --border:#d0d7de;--bg:#fff;--rowhover:#f6f8fa;--head:#eaeef2}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--fg);font-size:15px;line-height:1.5}
  .wrap{max-width:920px;margin:0 auto;padding:24px 24px 60px}
  header{border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:8px}
  header h1{font-size:1.5rem;margin:0;font-weight:600}
  header .sub{display:inline-block;padding:1px 9px;border-radius:20px;font-size:.72rem;font-weight:700;vertical-align:3px;margin-left:8px}
  body.rel  header .sub{background:#dafbe1;color:#1a7f37}
  body.snap header .sub{background:#fff8c5;color:#9a6700}
  header .crumb{color:var(--muted);font-size:.9rem;margin-top:6px}
  header .crumb a{color:var(--link);text-decoration:none}
  a{color:var(--link);text-decoration:none}a:visited{color:var(--visited)}a:hover{text-decoration:underline}
  #warn{display:none;background:#fff8c5;border:1px solid #d4a72c55;border-radius:8px;padding:9px 14px;margin-bottom:16px;font-size:.84rem;color:#7d4e00}
  body.snap #warn{display:block}
  table{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:18px}
  th,td{padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:.92rem}
  th{background:var(--head);color:var(--muted);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.03em}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:var(--rowhover)}
  td.name,th.name{min-width:50%}
  td.date,th.date,td.size,th.size{white-space:nowrap;color:var(--muted)}
  td.size,th.size{text-align:right}
  .icon{display:inline-block;width:16px;margin-right:6px;opacity:.7;vertical-align:-2px}
  .badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.7rem;background:#ddf4ff;color:#0969da;margin-left:8px;font-weight:600;vertical-align:1px}
  body.snap .badge{background:#fff8c5;color:#9a6700}
  .badge.count{background:#eaeef2;color:#57606a}
  .empty{color:var(--muted);margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <div id="warn">⚠️ 快照(测试)固件,未经发布确认,仅供内部调试。请勿分发给客户或产线。</div>
  <header>
    <h1 id="title"></h1>
    <div class="crumb" id="crumb"></div>
  </header>
  <div id="view"></div>
</div>

<script>
/* ===== 单一模板:通道由自身 URL 路径决定,fetch 同目录的 data.json =====
   同一份文件同时部署在 /releases/ 和 /snapshots/ 下,内容字节一致。 */
const IS_SNAP = /\/snapshots\/?$/.test(location.pathname);
const CH = IS_SNAP
  ? {sub:'SNAPSHOT', cls:'snap', title:'Snapshots', dir:'snapshots/', newest:'newest'}
  : {sub:'RELEASE',  cls:'rel',  title:'Focalcrest Rockchip Linux Images', dir:'releases/', newest:'latest'};
document.body.classList.add(CH.cls);

let DATA=[];
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtSize=b=> b>1e6?(b/1e6).toFixed(1)+' MB':(b/1e3).toFixed(0)+' KB';
const fmtDate=iso=>new Date(iso).toISOString().slice(0,16).replace('T',' ');
const sub=`<span class="sub">${CH.sub}</span>`;

function grouped(){const g={};DATA.forEach(r=>{(g[r.board]=g[r.board]||[]).push(r)});
  Object.values(g).forEach(a=>a.sort((x,y)=>y.date.localeCompare(x.date)));return g;}
const icoFolder='<svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1A1.75 1.75 0 000 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0016 13.25v-8.5A1.75 1.75 0 0014.25 3H7.5a.25.25 0 01-.2-.1l-.9-1.2A1.75 1.75 0 005 1H1.75z"/></svg>';
const icoFile='<svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 1H3.75A1.75 1.75 0 002 2.75v10.5c0 .966.784 1.75 1.75 1.75h8.5A1.75 1.75 0 0014 13.25V5.5L9.5 1z" opacity=".5"/><path d="M9.5 1v3.25c0 .414.336.75.75.75H14L9.5 1z"/></svg>';

function renderIndex(){
  const g=grouped();const boards=Object.keys(g).sort((a,b)=>g[b][0].date.localeCompare(g[a][0].date));
  $('#title').innerHTML=CH.title+sub;
  $('#crumb').innerHTML=`Index of / ${CH.dir}`;
  if(!boards.length){$('#view').innerHTML='<p class="empty">No images yet.</p>';return;}
  $('#view').innerHTML=`<table><thead><tr><th class="name">Name</th><th class="date">Last modified</th><th class="size">Size</th></tr></thead>
    <tbody>${boards.map(b=>{const arr=g[b],latest=arr[0];
      return `<tr><td class="name">${icoFolder}<a href="#/${encodeURIComponent(b)}/">${esc(b)}/</a>
        <span class="badge count">${arr.length}</span></td>
        <td class="date">${fmtDate(latest.date)}</td><td class="size">-</td></tr>`;}).join('')}</tbody></table>`;
}
function renderBoard(board){
  const arr=grouped()[board]||[];
  $('#title').innerHTML=esc(board)+sub;
  $('#crumb').innerHTML=`Index of / <a href="#/">${CH.dir}</a> / ${esc(board)}/`;
  if(!arr.length){$('#view').innerHTML='';return;}
  $('#view').innerHTML=`<table><thead><tr><th class="name">Name</th><th class="date">Last modified</th><th class="size">Size</th><th>Details</th></tr></thead>
    <tbody>${arr.map((r,i)=>`<tr><td class="name">${icoFile}<a href="${esc(r.url)}">${esc(r.asset)}</a>${i===0?` <span class="badge">${CH.newest}</span>`:''}</td>
      <td class="date">${fmtDate(r.date)}</td><td class="size">${fmtSize(r.size)}</td>
      <td><a href="${esc(r.release_url)}" target="_blank" rel="noopener">notes ↗</a></td></tr>`).join('')}</tbody></table>`;
}
function renderNotFound(name){
  $('#title').innerHTML=esc(name)+sub;
  $('#crumb').innerHTML=`Index of / <a href="#/">${CH.dir}</a> / ${esc(name)}`;
  $('#view').innerHTML=`<p class="empty">No image found for “${esc(name)}”.</p>`;
}
// #/<board>/latest → 先渲染状态(避免白屏),再自动触发下载该板本通道最新镜像
function downloadLatest(board, entry){
  $('#title').innerHTML=`${esc(board)} · ${CH.newest}`+sub;
  $('#crumb').innerHTML=`Index of / <a href="#/">${CH.dir}</a> / `
    +`<a href="#/${encodeURIComponent(board)}/">${esc(board)}/</a> / ${CH.newest}`;
  $('#view').innerHTML=`<p>正在下载 <b>${esc(board)}</b> 最新镜像:
      <a href="${esc(entry.url)}">${esc(entry.asset)}</a>
      <span class="badge">${fmtSize(entry.size)}</span></p>
    <p class="empty">如果下载没有自动开始,请点击上面的文件名。</p>`;
  const a=document.createElement('a');a.href=entry.url;document.body.appendChild(a);a.click();a.remove();
}
function route(){
  const h=location.hash.replace(/^#/,'');
  const lm=h.match(/^\/([^/]+)\/latest\/?$/);   // #/<board>/latest → 自动下载
  if(lm){const board=decodeURIComponent(lm[1]);const arr=grouped()[board];
    if(arr&&arr.length){downloadLatest(board,arr[0]);return;} renderNotFound(board);return;}
  const m=h.match(/^\/([^/]+)\/?$/);
  if(m&&grouped()[decodeURIComponent(m[1])])renderBoard(decodeURIComponent(m[1]));
  else if(m)renderNotFound(decodeURIComponent(m[1]));
  else renderIndex();}

fetch('data.json?v='+Date.now()).then(r=>r.json()).then(d=>{DATA=d;route();window.addEventListener('hashchange',route);});
</script>
</body>
</html>
