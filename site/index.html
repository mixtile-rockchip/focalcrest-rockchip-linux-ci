<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focalcrest Rockchip Linux Images</title>
<style>
  :root{
    --fg:#1f2328; --muted:#57606a; --link:#0969da; --visited:#6f42c1;
    --border:#d0d7de; --bg:#fff; --rowhover:#f6f8fa; --head:#eaeef2;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
       background:var(--bg);color:var(--fg);font-size:15px;line-height:1.5}
  .wrap{max-width:920px;margin:0 auto;padding:28px 24px 60px}
  header{border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:8px}
  header h1{font-size:1.5rem;margin:0;font-weight:600}
  header .crumb{color:var(--muted);font-size:.9rem;margin-top:6px}
  header .crumb a{color:var(--link);text-decoration:none}
  header .crumb a:hover{text-decoration:underline}
  a{color:var(--link);text-decoration:none}
  a:visited{color:var(--visited)}
  a:hover{text-decoration:underline}
  table{width:100%;border-collapse:collapse;border:1px solid var(--border);
        border-radius:8px;overflow:hidden;margin-top:18px}
  th,td{padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:.92rem}
  th{background:var(--head);color:var(--muted);font-weight:600;font-size:.78rem;
     text-transform:uppercase;letter-spacing:.03em}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:var(--rowhover)}
  td.name,th.name{min-width:42%}
  td.date,th.date,td.size,th.size{white-space:nowrap;color:var(--muted)}
  td.size,th.size{text-align:right}
  .icon{display:inline-block;width:16px;margin-right:6px;opacity:.7;vertical-align:-2px}
  .badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.7rem;
        background:#ddf4ff;color:#0969da;margin-left:8px;font-weight:600;vertical-align:1px}
  .empty{color:var(--muted);margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title">Focalcrest Rockchip Linux Images</h1>
    <div class="crumb" id="crumb"></div>
  </header>
  <div id="view"></div>
</div>

<script>
let DATA=[];
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtSize=b=> b>1e6?(b/1e6).toFixed(1)+' MB':(b/1e3).toFixed(0)+' KB';
const fmtDate=iso=>new Date(iso).toISOString().slice(0,16).replace('T',' ');

function grouped(){
  const g={};
  DATA.forEach(r=>{(g[r.board]=g[r.board]||[]).push(r);});
  Object.values(g).forEach(a=>a.sort((x,y)=>y.date.localeCompare(x.date)));
  return g;
}

const icoFolder='<svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1A1.75 1.75 0 000 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0016 13.25v-8.5A1.75 1.75 0 0014.25 3H7.5a.25.25 0 01-.2-.1l-.9-1.2A1.75 1.75 0 005 1H1.75z"/></svg>';
const icoFile='<svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 1H3.75A1.75 1.75 0 002 2.75v10.5c0 .966.784 1.75 1.75 1.75h8.5A1.75 1.75 0 0014 13.25V5.5L9.5 1z" opacity=".5"/><path d="M9.5 1v3.25c0 .414.336.75.75.75H14L9.5 1z"/></svg>';

function renderIndex(){
  const g=grouped();
  const boards=Object.keys(g).sort((a,b)=>g[b][0].date.localeCompare(g[a][0].date));
  $('#title').textContent='Focalcrest Rockchip Linux Images';
  $('#crumb').textContent='Index of /';
  if(!boards.length){ $('#view').innerHTML='<p class="empty">No images yet.</p>'; return; }
  $('#view').innerHTML=`<table>
    <thead><tr><th class="name">Name</th><th class="date">Last modified</th>
      <th class="size">Size</th><th>Board</th></tr></thead>
    <tbody>${boards.map(b=>{
      const arr=g[b], latest=arr[0];
      return `<tr>
        <td class="name">${icoFolder}<a href="#/${encodeURIComponent(b)}/">${esc(b)}/</a>
            <span class="badge">${arr.length}</span></td>
        <td class="date">${fmtDate(latest.date)}</td>
        <td class="size">-</td>
        <td>${esc(b)}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

function renderBoard(board){
  const arr=grouped()[board]||[];
  $('#title').textContent=board;
  $('#crumb').innerHTML=`Index of / <a href="#/">[..]</a> / ${esc(board)}/`;
  if(!arr.length){ $('#view').innerHTML=''; return; }
  $('#view').innerHTML=`<table>
    <thead><tr><th class="name">Name</th><th class="date">Last modified</th>
      <th class="size">Size</th><th>Details</th></tr></thead>
    <tbody>${arr.map((r,i)=>`
      <tr>
        <td class="name">${icoFile}<a href="${esc(r.url)}">${esc(r.asset)}</a>${i===0?' <span class="badge">latest</span>':''}</td>
        <td class="date">${fmtDate(r.date)}</td>
        <td class="size">${fmtSize(r.size)}</td>
        <td><a href="${esc(r.release_url)}" target="_blank" rel="noopener">notes ↗</a></td>
      </tr>`).join('')}</tbody></table>`;
}

function route(){
  const m=location.hash.replace(/^#/,'').match(/^\/([^/]+)\/?$/);
  if(m && grouped()[decodeURIComponent(m[1])]) renderBoard(decodeURIComponent(m[1]));
  else renderIndex();
}

fetch('data.json').then(r=>r.json()).then(d=>{
  DATA=d;
  route();
  window.addEventListener('hashchange',route);
});
</script>
</body>
</html>
